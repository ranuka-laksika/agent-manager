apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: RestApi
metadata:
  name: amp-otel-collector-tracing-rest-api
  # Per-org-env namespace isolation: RestApis live in the gateway's own
  # "<org>-<env>" namespace (default env). NOTE: superseded by the
  # chart-managed gateway-otel-restapi (which carries the restapi-target
  # binding label); kept for standalone/manual application only.
  namespace: default-default
spec:
  displayName: amp-otel-collector-tracing-rest-api
  version: v1.0
  context: /otel
  upstream:
    main:
      url: http://opentelemetry-collector.openchoreo-observability-plane.svc.cluster.local:4318
  policies:
    - name: jwt-auth
      version: v1
      params:
        headerName: x-amp-api-key
        authHeaderPrefix: ""
        issuers:
          - agent-manager-service
        claimMappings:
          sub: x-user-id
          component_uid: x-user-component
          environment_uid: x-user-environment
          project_uid: x-user-project
          namespace: x-user-namespace
  operations:
    - method: POST
      path: /v1/traces
