# Values overrides for the observability-metrics-prometheus module
# (wraps kube-prometheus-stack).
#
# cAdvisorMetricRelabelings: the first 8 rules reproduce the
# kube-prometheus-stack 81.6.3 defaults (helm replaces, not merges, list
# values — omitting them here would drop them). The last rule is ours:
#
# Sandboxed isolation tiers (gVisor, Kata) do not account usage in
# per-app-container host cgroups the way runc does — cAdvisor sees the usage
# only in the pod's sandbox/pause cgroup (gVisor: the runsc sentry; Kata: the
# qemu VMM), which cAdvisor exports with container="". The OpenChoreo metrics
# adapter queries container_cpu_usage_seconds_total / _memory_working_set_bytes
# with {container!=""}, so gVisor/Kata agents show empty CPU/memory usage.
# The rule stamps container="sandbox" onto sandbox-cgroup series
# (container="" but image!="" — i.e. the pause-image container record) so
# container-scoped queries see them. Pod-level cgroup aggregate series
# (image="") stay container="" and excluded, avoiding double counting; on
# runc the relabeled pause series adds only its real ~200KiB.
kube-prometheus-stack:
  kubelet:
    serviceMonitor:
      cAdvisorMetricRelabelings:
        # --- kube-prometheus-stack 81.6.3 defaults (keep in sync on upgrades) ---
        # Drop less useful container CPU metrics.
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
        # Drop less useful container / always zero filesystem metrics.
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
        # Drop less useful / always zero container memory metrics.
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_memory_(mapped_file|swap)'
        # Drop less useful container process metrics.
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_(file_descriptors|tasks_state|threads_max)'
        # Drop container_memory_failures_total{scope="hierarchy"} metrics.
        - sourceLabels: [__name__, scope]
          action: drop
          regex: 'container_memory_failures_total;hierarchy'
        # Drop network metrics for CNI and similar interfaces.
        - sourceLabels: [__name__, interface]
          action: drop
          regex: 'container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*'
        # Drop container spec metrics that overlap with kube-state-metrics.
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_spec.*'
        # Drop cgroup metrics with no pod.
        - sourceLabels: [id, pod]
          action: drop
          regex: '.+;'
        # --- OpenChoreo sandbox-runtime fix (see header comment) ---
        - sourceLabels: [container, image]
          action: replace
          regex: ';.+'
          targetLabel: container
          replacement: sandbox
