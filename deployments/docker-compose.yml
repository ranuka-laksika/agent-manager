services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agent-manager-db
    environment:
      POSTGRES_DB: agentmanager
      POSTGRES_USER: agentmanager
      POSTGRES_PASSWORD: agentmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agentmanager" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-manager

  # Agent Manager Service (Go Backend)
  agent-manager-service:
    build:
      context: ../agent-manager-service
      dockerfile: Dockerfile.dev
    container_name: agent-manager-service
    ports:
      - "9000:8080"
      - "9243:9243"
    environment:
      # Database Configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agentmanager
      - DB_PASSWORD=agentmanager
      - DB_NAME=agentmanager
      # Server Configuration
      - SERVER_PORT=8080
      - SERVER_PUBLIC_URL=http://localhost:9000
      - OAUTH_AUTHORIZATION_SERVERS=http://thunder.amp.localhost:8080
      - OAUTH_SCOPES_SUPPORTED=amp:llm-proxy:deploy,amp:mcp-server:create,amp:org:invite-member,amp:role:delete,amp:monitor:read,amp:agent:deploy-production,amp:git-secret:delete,amp:llm-provider:delete,amp:mcp-server:configure-guardrail,amp:agent:promote,amp:deployment-pipeline:create,amp:deployment-pipeline:read,amp:deployment-pipeline:update,amp:deployment-pipeline:delete,amp:gateway:delete,amp:group:delete,amp:llm-proxy:update,amp:monitor:score-read,amp:llm-provider-template:update,amp:agent:build,amp:agent:rollback,amp:agent:token-manage,amp:evaluator:read,amp:llm-provider-template:read,amp:monitor:create,amp:agent:suspend,amp:gateway:token-manage,amp:git-secret:read,amp:mcp-server:connect,amp:mcp-server:api-key-manage,amp:mcp-server:read,amp:observability:project-dashboard,amp:group:create,amp:observability:org-dashboard,amp:org:remove-member,amp:agent:deploy-non-production,amp:group:read,amp:llm-provider-template:create,amp:project:delete,amp:agent:create,amp:evaluator:create,amp:llm-provider:read,amp:org:modify-settings,amp:catalog:read,amp:environment:update,amp:group:update,amp:llm-proxy:delete,amp:project:read,amp:data-plane:read,amp:agent:read,amp:environment:read,amp:llm-provider:configure-guardrail,amp:observability:guardrail-metric,amp:org:assign-role,amp:project:update,amp:mcp-server:delete,amp:environment:delete,amp:evaluator:update,amp:git-secret:create,amp:monitor:execute,amp:llm-provider:api-key-manage,amp:gateway:read,amp:agent:update,amp:llm-provider-template:delete,amp:monitor:delete,amp:org:view,amp:llm-provider:create,amp:mcp-server:update,amp:org:manage-idp,amp:role:read,amp:role:update,amp:agent:delete,amp:gateway:create,amp:llm-provider:deploy,amp:llm-proxy:api-key-manage,amp:monitor:update,amp:org:manage-service-account,amp:role:create,amp:evaluator:delete,amp:llm-provider:connect,amp:llm-provider:update,amp:llm-proxy:read,amp:monitor:score-publish,amp:observability:infra-metric,amp:project:create,amp:repository:read,amp:gateway:update,amp:environment:create,amp:llm-proxy:create,amp:agent:api-key-manage,amp:agent-kind:read,amp:agent-kind:create,amp:agent-kind:update,amp:agent-kind:delete,amp:profile:read,amp:profile:update-attributes
      - RBAC_ENABLED=${RBAC_ENABLED:-true}
      # Kubernetes Configuration
      - KUBECONFIG=/app/.kube/config
      - IS_LOCAL_DEV_ENV=true
      # JWT Configuration
      - JWT_SIGNING_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_SIGNING_PUBLIC_KEYS_CONFIG=/app/keys/public-keys-config.json
      - JWT_SIGNING_ACTIVE_KEY_ID=key-1
      - JWT_SIGNING_DEFAULT_EXPIRY=8760h
      - JWT_SIGNING_ISSUER=agent-manager-service
      - JWT_SIGNING_DEFAULT_ENVIRONMENT=default
      # Optional: External Service URLs (add when needed)
      # - OPENCHOREO_API_URL=http://host.docker.internal:8000
      # - OPENSEARCH_URL=http://host.docker.internal:9200
      - OBSERVER_URL=http://host.docker.internal:8085
      - TRACE_OBSERVER_URL=http://host.docker.internal:9098
      # Externally reachable trace observer URL returned to the CLI via /v1/config.
      # Mirrors the console's OBS_API_BASE_URL so the CLI and console agree.
      - TRACE_OBSERVER_PUBLIC_URL=http://localhost:9098
      - IDP_TOKEN_URL=http://thunder.amp.localhost:8080/oauth2/token
      - IDP_CLIENT_ID=amp-api-client
      - IDP_CLIENT_SECRET=amp-api-client-secret
      # Key Manager / JWT validation configuration
      # Accepts Thunder-issued tokens (client_credentials for publisher)
      - KEY_MANAGER_JWKS_URL=http://thunder.amp.localhost:8080/oauth2/jwks
      - KEY_MANAGER_ISSUER=Agent Management Platform Local,http://thunder.amp.localhost:8080
      - KEY_MANAGER_AUDIENCE=amp,localhost,amp-publisher-*,amp-api-client,amp-console-client,amctl,am-mcp,http://localhost:9000/
      - AMP_VERSION=v0.8.0
      - OPEN_CHOREO_BASE_URL=http://api.openchoreo.localhost:8195
      # OpenBao/Vault Secret Management Configuration
      # NOTE: Run ./deployments/setup/port-forward.sh to forward OpenBao from k3d cluster
      # Uses the default OpenBao that comes with OpenChoreo for both user and system secrets
      - SECRET_MANAGER_PROVIDER=openbao
      - OPENBAO_URL=http://host.docker.internal:8200
      - OPENBAO_TOKEN=root
      - OPENBAO_PATH=secret
      - OPENBAO_VERSION=v2
      # Workflow Plane OpenBao (for git secrets and publisher credentials)
      - WORKFLOW_PLANE_OPENBAO_URL=http://host.docker.internal:8200
      - WORKFLOW_PLANE_OPENBAO_TOKEN=root
      # Thunder API (for per-org publisher credential provisioning)
      # Uses the system app's client_credentials with scope=system to get admin tokens.
      # Leave THUNDER_BASE_URL empty to fall back to static amp-publisher-client credentials.
      - THUNDER_BASE_URL=http://thunder.amp.localhost:8080
      - THUNDER_CLIENT_ID=amp-system-client
      - THUNDER_CLIENT_SECRET=amp-system-client-secret
      # Encryption Configuration (AES-256-GCM, hex-encoded 32-byte key)
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    volumes:
      # Mount source code for hot-reloading
      - ../agent-manager-service:/app
      # Use container-specific keys (not host) so paths are correct
      - agent_manager_keys:/app/keys
      # Exclude vendor and tmp directories from mount
      - /app/vendor
      - /app/tmp
      - /app/.bin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agent-manager
      - k3d-openchoreo-local-setup # Connect to k3d cluster network for hostname resolution
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # OpenChoreo API uses Host-based routing via Kgateway on port 8080.
      # The gateway routes requests based on the Host header, so we need the
      # hostname to resolve to the host machine for proper routing.
      - "api.openchoreo.localhost:host-gateway"
      # Thunder IDP for OAuth2 token exchange (must match OpenChoreo's security.oidc config)
      - "thunder.amp.localhost:host-gateway"
      # API Platform Gateway runtime for agent endpoint access
      - "api-platform-gateway.amp.localhost:host-gateway"

  # Agent Manager Console (React Frontend)
  agent-manager-console:
    build:
      context: ../console
      dockerfile: Dockerfile.dev
      args:
        # Pass the host's absolute path so the container WORKDIR matches,
        # ensuring rush/pnpm symlinks resolve to the same paths on both sides.
        WORKDIR_PATH: ${CONSOLE_HOST_PATH}
    container_name: agent-manager-console
    ports:
      - "3000:3000"
    environment:
      - AUTH_CLIENT_ID=amp-console-client
      - AUTH_BASE_URL=http://thunder.amp.localhost:8080
      - SIGN_IN_REDIRECT_URL=http://localhost:3000/login
      - SIGN_OUT_REDIRECT_URL=http://localhost:3000/login
      - API_BASE_URL=http://localhost:9000
      - DISABLE_AUTH=false
      - AUTH_SCOPES=openid profile email amp:org:view amp:org:modify-settings amp:org:invite-member amp:org:remove-member amp:org:assign-role amp:org:manage-idp amp:org:manage-service-account amp:project:create amp:project:read amp:project:update amp:project:delete amp:environment:create amp:environment:read amp:environment:update amp:environment:delete amp:gateway:create amp:gateway:read amp:gateway:update amp:gateway:delete amp:gateway:token-manage amp:data-plane:read amp:deployment-pipeline:create amp:deployment-pipeline:read amp:deployment-pipeline:update amp:deployment-pipeline:delete amp:git-secret:create amp:git-secret:read amp:git-secret:delete amp:llm-provider-template:create amp:llm-provider-template:read amp:llm-provider-template:update amp:llm-provider-template:delete amp:llm-provider:create amp:llm-provider:read amp:llm-provider:update amp:llm-provider:delete amp:llm-provider:configure-guardrail amp:llm-provider:connect amp:llm-provider:deploy amp:llm-provider:api-key-manage amp:mcp-server:create amp:mcp-server:read amp:mcp-server:update amp:mcp-server:delete amp:mcp-server:configure-guardrail amp:mcp-server:connect amp:mcp-server:api-key-manage amp:llm-proxy:create amp:llm-proxy:read amp:llm-proxy:update amp:llm-proxy:delete amp:llm-proxy:deploy amp:llm-proxy:api-key-manage amp:evaluator:create amp:evaluator:read amp:evaluator:update amp:evaluator:delete amp:agent:create amp:agent:read amp:agent:update amp:agent:delete amp:agent:build amp:agent:deploy-non-production amp:agent:deploy-production amp:agent:promote amp:agent:rollback amp:agent:suspend amp:agent:token-manage amp:agent:api-key-manage amp:monitor:create amp:monitor:read amp:monitor:update amp:monitor:delete amp:monitor:execute amp:monitor:score-read amp:monitor:score-publish amp:observability:org-dashboard amp:observability:project-dashboard amp:observability:guardrail-metric amp:observability:infra-metric amp:role:create amp:role:read amp:role:update amp:role:delete amp:group:create amp:group:read amp:group:update amp:group:delete amp:catalog:read amp:repository:read amp:agent-kind:read amp:agent-kind:create amp:agent-kind:update amp:agent-kind:delete amp:profile:read amp:profile:update-attributes
      - RBAC_ENABLED=${RBAC_ENABLED:-true}
      - OBS_API_BASE_URL=http://localhost:9098
      - GATEWAY_CONTROL_PLANE_URL=http://localhost:9243
      - GATEWAY_VERSION=v0.11.0
      # Agent Manager release version — pins the deployment-script git tag (amp/vX.Y.Z).
      # Keep in sync with the agent-manager-service AMP_VERSION above.
      - AMP_VERSION=v0.16.0
      - INSTRUMENTATION_URL=http://localhost:22893/otel
      # Cluster-internal URLs the gateway uses to reach Agent Manager — piped
      # into the add-environment.sh command rendered by the Create Environment
      # drawer. In docker-compose mode AMS is on the host, so the gateway
      # (which runs in k3d) reaches it via host.docker.internal.
      - AGENT_MANAGER_INTERNAL_BASE_URL=http://host.docker.internal:9000
      - AGENT_MANAGER_INTERNAL_CP_HOST=host.docker.internal:9243
      - GUARDRAILS_CATALOG_URL=https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies?categories=Guardrails,AI&limit=100
      - GUARDRAILS_DEFINITION_BASE_URL=https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies
      - DOCS_URL=https://wso2.github.io/agent-manager/docs/next
      - FEATURE_FLAG_ENABLE_PRIVATE_REPO_SUPPORT=true
      - FEATURE_FLAG_ENABLE_PROFILE_MANAGEMENT=true
      - FEATURE_FLAG_ENABLE_USER_MANAGEMENT=true
    volumes:
      # Mount source code at the SAME absolute path as on the host so that
      # rush/pnpm symlinks in common/temp resolve identically in the container.
      - ${CONSOLE_HOST_PATH}:${CONSOLE_HOST_PATH}
      # Overlay node_modules and common/temp with named volumes so the container
      # keeps its own Linux-built binaries separate from the host's macOS ones.
      - console_node_modules:${CONSOLE_HOST_PATH}/node_modules
      - console_common_temp:${CONSOLE_HOST_PATH}/common/temp
    networks:
      - agent-manager
    depends_on:
      - agent-manager-service

volumes:
  postgres_data:
  console_node_modules:
  console_common_temp:
  agent_manager_keys:

networks:
  agent-manager:
    driver: bridge
  k3d-openchoreo-local-setup:
    external: true
