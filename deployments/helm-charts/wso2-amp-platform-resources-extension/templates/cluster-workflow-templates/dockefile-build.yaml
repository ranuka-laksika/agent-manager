apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: containerfile-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
          - name: build-args
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR="/mnt/vol/source"
            IMAGE="{{ "{{" }}workflow.parameters.image-name{{ "}}" }}:{{ "{{" }}workflow.parameters.image-tag{{ "}}" }}-{{ "{{" }}inputs.parameters.git-revision{{ "}}" }}"
            DOCKER_CONTEXT="{{ "{{" }}workflow.parameters.docker-context{{ "}}" }}"
            DOCKERFILE_PATH="{{ "{{" }}workflow.parameters.dockerfile-path{{ "}}" }}"
            BUILD_ENV_JSON='{{ "{{" }}inputs.parameters.build-env{{ "}}" }}'
            BUILD_ARGS_JSON='{{ "{{" }}inputs.parameters.build-args{{ "}}" }}'


            echo ">> Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Hint: Verify that the Dockerfile path is correct and relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Hint: Verify that the Docker build context points to a valid directory relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /etc/containers /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            # Build podman command using positional parameters ($1, $2, $3, ...).
            # "set --" assigns args to $@. Each arg stays separate, preserving spaces in values.
            # "$@" then executes the command with each parameter as a distinct argument.
            # This avoids eval and prevents shell injection.
            set -- podman build -t "$IMAGE" -f "$WORKDIR/$DOCKERFILE_PATH"

            # Add --env flags from the buildEnv JSON array
            # Each "set -- "$@" --env "$env_kv"" appends --env and KEY=VALUE as separate args
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              echo "$BUILD_ENV_JSON" | podman run --rm -i ghcr.io/jqlang/jq:1.7.1 -r '.[] | "\(.name)=\(.value)"' > /tmp/env_vars.txt
              while IFS= read -r env_kv; do
                set -- "$@" --env "$env_kv"
              done < /tmp/env_vars.txt
              rm -f /tmp/env_vars.txt
            fi

            # Add --build-arg flags from the buildArgs JSON array
            if [ -n "$BUILD_ARGS_JSON" ] && [ "$BUILD_ARGS_JSON" != "[]" ]; then
              echo "$BUILD_ARGS_JSON" | podman run --rm -i ghcr.io/jqlang/jq:1.7.1 -r '.[] | "\(.name)=\(.value)"' > /tmp/build_args.txt
              while IFS= read -r build_arg; do
                set -- "$@" --build-arg "$build_arg"
              done < /tmp/build_args.txt
              rm -f /tmp/build_args.txt
            fi

            # Add the build context as the last argument and execute
            set -- "$@" "$WORKDIR/$DOCKER_CONTEXT"
            "$@"

            echo ">> Verifying image security requirements..."
            IMAGE_USER=$(podman inspect "$IMAGE" --format '{{ "{{" }}.Config.User{{ "}}" }}')

            # Extract user part (before colon if present, e.g., "0:0" -> "0", "root:docker" -> "root")
            USER_PART="${IMAGE_USER%%:*}"

            if [ -z "$IMAGE_USER" ] || [ "$USER_PART" = "0" ] || [ "$USER_PART" = "root" ]; then
              echo ""
              echo "============================================================"
              echo "ERROR: Image must run as non-root user"
              echo "============================================================"
              echo ""
              echo "The built image does not specify a non-root USER."
              echo "Agent images are required to run as non-root for security."
              echo ""
              echo "============================================================"
              exit 1
            fi

            echo ">> Image user verified: $IMAGE_USER (non-root)"

            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
