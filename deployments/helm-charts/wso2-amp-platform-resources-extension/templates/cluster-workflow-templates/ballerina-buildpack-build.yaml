apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: ballerina-buildpack-build
spec:
  templates:
    - name: build-image
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
      podSpecPatch: '{"hostUsers": false}'
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
        # Writable scratch for buildpack generated-artifacts (not used downstream).
        - name: generated-artifacts
          emptyDir: {}
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR=/mnt/vol/source

            IMAGE="{{ "{{" }}workflow.parameters.image-name{{ "}}" }}:{{ "{{" }}workflow.parameters.image-tag{{ "}}" }}-{{ "{{" }}inputs.parameters.git-revision{{ "}}" }}"
            APP_PATH="{{ "{{" }}workflow.parameters.app-path{{ "}}" }}"
            BUILD_ENV_JSON='{{ "{{" }}inputs.parameters.build-env{{ "}}" }}'

            if [ ! -d "$WORKDIR/$APP_PATH" ]; then
              echo ">> Error: The specified application path '$APP_PATH' does not exist in the repository"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /etc/containers /storage/run /storage/graph /generated-artifacts
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            cat > /etc/containers/containers.conf <<CEOF
            [containers]
            netns="host"
            userns="host"
            ipcns="host"
            utsns="host"
            cgroupns="host"
            cgroups="disabled"
            log_driver = "k8s-file"
            [engine]
            cgroup_manager = "cgroupfs"
            events_logger="file"
            runtime="crun"
            CEOF

            echo ">> Initializing build environment"
            mkdir -p /run/podman
            podman system service --time=0 unix:///run/podman/podman.sock &
            until podman info --format '{{ "{{" }}.Host.RemoteSocket.Exists{{ "}}" }}' 2>/dev/null | grep -q true; do sleep 1; done
            export DOCKER_HOST=unix:///run/podman/podman.sock

            BUILDER="{{ include "openchoreo-workflow-plane.buildpackImage" (dict "id" "ballerina-builder" "context" .) }}"
            RUN_IMAGE="{{ include "openchoreo-workflow-plane.buildpackImage" (dict "id" "ballerina-run" "context" .) }}"

            echo ">> Preparing buildpack command"
            # Build pack command using positional parameters ($1, $2, $3, ...).
            # "set --" assigns args to $@. Each arg stays separate, preserving spaces in values.
            # "$@" then executes the command with each parameter as a distinct argument.
            # This avoids eval and prevents shell injection.
            set -- pack build "$IMAGE" \
              --builder "$BUILDER" \
              --run-image "$RUN_IMAGE" \
              --docker-host inherit \
              --path "$WORKDIR/$APP_PATH" \
              --volume "/generated-artifacts:/app/generated-artifacts:rw" \
              --pull-policy always

            # Add --env flags from the buildEnv JSON array
            # Each "set -- "$@" --env "$env_kv"" appends --env and KEY=VALUE as separate args
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              echo "$BUILD_ENV_JSON" | jq -r '.[] | "\(.name)=\(.value)"' > /tmp/env_vars.txt

              while IFS= read -r env_kv; do
                set -- "$@" --env "$env_kv"
              done < /tmp/env_vars.txt
              rm -f /tmp/env_vars.txt
            fi

            echo ">> Building image with Ballerina buildpack"
            "$@"

            echo ">> Image built successfully"

            until podman image exists "$IMAGE" 2>/dev/null; do
              sleep 1
            done

            echo ">> Verifying image security requirements"

            IMAGE_USER=$(podman inspect "$IMAGE" --format '{{ "{{" }}.Config.User{{ "}}" }}')
            # Extract user part (before colon if present, e.g., "0:0" -> "0", "root:docker" -> "root")
            USER_PART="${IMAGE_USER%%:*}"

            if [ -z "$IMAGE_USER" ] || [ "$USER_PART" = "0" ] || [ "$USER_PART" = "root" ]; then
              echo ""
              echo "============================================================"
              echo "ERROR: Image must run as non-root user"
              echo "============================================================"
              echo ""
              echo "The built image does not specify a non-root USER."
              echo "Agent images are required to run as non-root for security."
              echo ""
              echo "============================================================"
              exit 1
            fi

            echo ">> Image user verified: $IMAGE_USER"

            echo ">> Saving image"
            podman save -o /mnt/vol/app-image.tar "$IMAGE"

            echo ">> Image saved successfully"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
          - mountPath: /generated-artifacts
            name: generated-artifacts
