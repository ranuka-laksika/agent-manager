---
# ClusterAuthzRoleBinding for AMP API Client
# Grants admin role to the amp-api-client service account
# This allows agent-manager-service to access OpenChoreo APIs
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterAuthzRoleBinding
metadata:
  name: amp-api-client-binding
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  effect: allow
  entitlement:
    claim: client_id
    value: {{ .Values.authz.ampApiClient.clientId | default "amp-api-client" }}
  roleMappings:
    - roleRef:
        kind: ClusterAuthzRole
        name: {{ .Values.authz.ampApiClient.role | default "" }}
