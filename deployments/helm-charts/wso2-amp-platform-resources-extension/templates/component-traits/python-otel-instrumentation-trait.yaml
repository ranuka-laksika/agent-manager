apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: python-otel-instrumentation-trait
  namespace: {{ .Values.global.defaultResources.namespace }}
  annotations:
    openchoreo.dev/description: "Trait to add an init container for setting up OpenTelemetry instrumentation in Python applications"
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        instrumentationImage:
          type: string
          description: "Container image for the OpenTelemetry instrumentation setup"
        sdkVolumeName:
          type: string
          default: "otel-tracing-sdk-volume"
          description: "Name of the volume for SDK files"
        sdkMountPath:
          type: string
          default: "/otel-tracing-sdk"
          description: "Mount path for SDK in containers"
        otelEndpoint:
          type: string
          description: "OpenTelemetry collector endpoint URL"
        isTraceContentEnabled:
          type: string
          default: "true"
          description: "Flag to enable or disable tracing of content"
        agentApiKey:
          type: string
          default: ""
          description: "API key for authenticating with the agent service"
        instrumentationEnabled:
          type: boolean
          default: true
          description: "Enable or disable OTEL instrumentation"
      required:
        - instrumentationImage
        - otelEndpoint

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        instrumentationEnabled:
          type: boolean
          default: true
          description: "Enable or disable OTEL instrumentation for this environment"
        otelEndpoint:
          type: string
          description: "Environment-specific OpenTelemetry collector endpoint URL"
        agentApiKey:
          type: string
          description: "Environment-specific API key for authenticating with the agent service"
        isTraceContentEnabled:
          type: string
          default: "true"
          description: "Flag to enable or disable tracing of content for this environment"

  # Create Secret for the agent API key
  creates:
    - includeWhen: |
        ${has(environmentConfigs.instrumentationEnabled) ? environmentConfigs.instrumentationEnabled : parameters.instrumentationEnabled}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${metadata.name}-agent-api-key
          namespace: ${metadata.namespace}
        type: Opaque
        stringData:
          api-key: |
            ${has(environmentConfigs.agentApiKey) ? environmentConfigs.agentApiKey : parameters.agentApiKey}

  # Patches to modify the Deployment resource
  patches:
    - includeWhen: |
        ${has(environmentConfigs.instrumentationEnabled) ? environmentConfigs.instrumentationEnabled : parameters.instrumentationEnabled}
      target:
        kind: Deployment
        group: apps
        version: v1
      operations:
        # 1. Add init container to spec.template.spec.initContainers
        - op: add
          path: /spec/template/spec/initContainers/-
          value:
            name: setup-instrumentation
            image: ${parameters.instrumentationImage}
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - name: ${parameters.sdkVolumeName}
                mountPath: ${parameters.sdkMountPath}

        # 2. Add emptyDir volume for sharing SDK files
        - op: add
          path: /spec/template/spec/volumes/-
          value:
            name: ${parameters.sdkVolumeName}
            emptyDir: {}

        # 3. Add volume mount to main container: main application container is at index 0
        - op: add
          path: /spec/template/spec/containers/0/volumeMounts/-
          value:
            name: ${parameters.sdkVolumeName}
            mountPath: ${parameters.sdkMountPath}
            readOnly: true

        # 4. Set environment variables in main container
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_OTEL_ENDPOINT
            value: "${has(environmentConfigs.otelEndpoint) ? environmentConfigs.otelEndpoint : parameters.otelEndpoint}"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_TRACE_CONTENT
            value: "${has(environmentConfigs.isTraceContentEnabled) ? environmentConfigs.isTraceContentEnabled : parameters.isTraceContentEnabled}"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_AGENT_API_KEY
            valueFrom:
              secretKeyRef:
                name: ${metadata.name}-agent-api-key
                key: api-key
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: PYTHONPATH
            value: "${parameters.sdkMountPath}"
