apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: instrumentation-trait-env-injection
  namespace: {{ .Values.global.defaultResources.namespace }}
  annotations:
    openchoreo.dev/description: "Trait to inject OpenTelemetry and agent API key environment variables into containers"
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        otelEndpoint:
          type: string
          description: "OpenTelemetry collector endpoint URL"
        agentApiKey:
          type: string
          description: "API key for authenticating with the agent service"
        envInjectionEnabled:
          type: boolean
          default: true
          description: "Enable or disable env injection instrumentation"
      required:
        - otelEndpoint
        - agentApiKey

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        envInjectionEnabled:
          type: boolean
          default: true
          description: "Enable or disable env injection instrumentation for this environment"
        otelEndpoint:
          type: string
          description: "Environment-specific OpenTelemetry collector endpoint URL"
        agentApiKey:
          type: string
          description: "Environment-specific API key for authenticating with the agent service"

  # Create Secret for the agent API key
  creates:
    - includeWhen: |
        ${has(environmentConfigs.envInjectionEnabled) ? environmentConfigs.envInjectionEnabled : parameters.envInjectionEnabled}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${metadata.name}-agent-api-key
          namespace: ${metadata.namespace}
        type: Opaque
        stringData:
          api-key: |
             ${has(environmentConfigs.agentApiKey) ? environmentConfigs.agentApiKey : parameters.agentApiKey}

  # Patches to modify the Deployment resource
  patches:
    - includeWhen: |
        ${has(environmentConfigs.envInjectionEnabled) ? environmentConfigs.envInjectionEnabled : parameters.envInjectionEnabled}
      target:
        kind: Deployment
        group: apps
        version: v1
      operations:
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_OTEL_ENDPOINT
            value: "${has(environmentConfigs.otelEndpoint) ? environmentConfigs.otelEndpoint : parameters.otelEndpoint}"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_AGENT_API_KEY
            valueFrom:
              secretKeyRef:
                name: ${metadata.name}-agent-api-key
                key: api-key
