apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: instrumentation-trait-env-injection
  namespace: {{ .Values.global.defaultResources.namespace }}
  annotations:
    openchoreo.dev/description: "Trait to inject OpenTelemetry and agent API key environment variables into containers"
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        agentApiKeySecretRef:
          type: string
          description: "Remote-store reference (ExternalSecret remoteRef key) of the agent API key. The raw key is never passed to the trait — only this reference."
        agentApiKeySecretProperty:
          type: string
          description: "Optional property within the remote secret that holds the agent API key (ExternalSecret remoteRef property)."
        envInjectionEnabled:
          type: boolean
          default: true
          description: "Enable or disable env injection instrumentation"
        otelEndpointEnvName:
          type: string
          default: "AMP_OTEL_ENDPOINT"
          description: "Name of the environment variable to inject the OTEL endpoint into. Override per language (e.g. Ballerina uses BAL_CONFIG_VAR_BALLERINAX_AMP_OTELENDPOINT)."
        apiKeyEnvName:
          type: string
          default: "AMP_AGENT_API_KEY"
          description: "Name of the environment variable to inject the agent API key into. Override per language (e.g. Ballerina uses BAL_CONFIG_VAR_BALLERINAX_AMP_APIKEY)."
      required:
        - agentApiKeySecretRef

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        envInjectionEnabled:
          type: boolean
          description: "Enable or disable env injection instrumentation for this environment"
        agentApiKeySecretRef:
          type: string
          description: "Environment-specific remote-store reference of the agent API key (ExternalSecret remoteRef key)."
        agentApiKeySecretProperty:
          type: string
          description: "Environment-specific property within the remote secret that holds the agent API key (ExternalSecret remoteRef property)."

  # Always create the ExternalSecret — patches always run regardless of includeWhen,
  # so the materialized Secret must always exist to satisfy the AMP_AGENT_API_KEY secretKeyRef.
  # The agent API key value lives in the KV store; here we only reference it by its KV path
  # (agentApiKeySecretRef), so the raw key is never persisted in the control plane.
  creates:
    - template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.name}-agent-api-key
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${metadata.name}-agent-api-key
            creationPolicy: Owner
          data:
            - secretKey: api-key
              remoteRef:
                key: |-
                  ${has(environmentConfigs.agentApiKeySecretRef) ? environmentConfigs.agentApiKeySecretRef : parameters.agentApiKeySecretRef}
                property: |-
                  ${has(environmentConfigs.agentApiKeySecretProperty) ? environmentConfigs.agentApiKeySecretProperty : (has(parameters.agentApiKeySecretProperty) ? parameters.agentApiKeySecretProperty : oc_omit())}

  # Patches to inject AMP_OTEL_ENDPOINT and AMP_AGENT_API_KEY.
  # This is the sole injector for these vars across all agent types.
  # Gated by envInjectionEnabled (per-environment overridable) the same way the
  # OTEL instrumentation traits gate on instrumentationEnabled: when false the
  # 'where' clause filters out the target so no env vars are injected. The
  # parameter defaults to true, so agent types that never set it (Python, Docker)
  # are unaffected.
  patches:
    - target:
        kind: Deployment
        group: apps
        version: v1
        where: |
          ${has(environmentConfigs.envInjectionEnabled) ? environmentConfigs.envInjectionEnabled : parameters.envInjectionEnabled}
      operations:
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: ${parameters.otelEndpointEnvName}
            # kgateway-routed vhost ("<env>-<org>.<domain>"): traces flow through
            # kgateway -> api-platform gateway runtime -> /otel RestApi, the same
            # path external agents use. Routing by hostname keeps this URL
            # independent of the namespace the gateway runtime is deployed in.
            value: "http://${metadata.environmentName}-${metadata.componentNamespace}.{{ .Values.apiPlatformGatewayVhost.host }}:{{ .Values.apiPlatformGatewayVhost.port }}/otel"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: ${parameters.apiKeyEnvName}
            valueFrom:
              secretKeyRef:
                name: ${metadata.name}-agent-api-key
                key: api-key
