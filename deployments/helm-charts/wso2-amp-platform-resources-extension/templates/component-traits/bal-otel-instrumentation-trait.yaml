apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: ballerina-otel-instrumentation-trait
  namespace: {{ .Values.global.defaultResources.namespace }}
  annotations:
    openchoreo.dev/description: "Trait that mounts am-instrumentation.toml into a Ballerina agent and sets BAL_CONFIG_FILES, enabling AMP tracing. The OTEL endpoint and API key env vars are injected separately by instrumentation-trait-env-injection."
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        configMountDir:
          type: string
          # The whole config volume is mounted at this dedicated directory and
          # BAL_CONFIG_FILES references am-instrumentation.toml by ABSOLUTE path.
          # A single-file subPath mount into the app WORKDIR would be simpler, but
          # subPath file mounts are not supported under Kata Containers (virtiofs
          # exposes them as directories), so the mount must stay subPath-free to
          # work across all isolation tiers (runc/gVisor/Kata).
          default: "/amp-instrumentation"
          description: "Directory in the main container where the instrumentation config volume is mounted."
        instrumentationEnabled:
          type: boolean
          default: true
          description: "Enable or disable AMP tracing for the Ballerina agent."

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        instrumentationEnabled:
          type: boolean
          description: "Enable or disable AMP tracing for this environment."

  # When disabled, am-instrumentation.toml is not mounted and BAL_CONFIG_FILES is not set, so Ballerina emits no traces.
  patches:
    - target:
        kind: SandboxTemplate
        group: extensions.agents.x-k8s.io
        version: v1alpha1
        where: |
          ${has(environmentConfigs.instrumentationEnabled) ? environmentConfigs.instrumentationEnabled : parameters.instrumentationEnabled}
      operations:
        # 1. Init container writes am-instrumentation.toml into a shared volume.
        - op: add
          path: /spec/podTemplate/spec/initContainers/-
          value:
            name: setup-bal-instrumentation
            image: busybox:1.36
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -c
              - |
                cat > /amp-instrumentation/am-instrumentation.toml <<'EOF'
                [ballerina.observe]
                tracingEnabled=true
                tracingProvider="amp"
                EOF
            volumeMounts:
              - name: bal-instrumentation-config
                mountPath: /amp-instrumentation

        # 2. Shared emptyDir volume holding the generated toml.
        - op: add
          path: /spec/podTemplate/spec/volumes/-
          value:
            name: bal-instrumentation-config
            emptyDir: {}

        # 3. Mount the config volume at its own directory (no subPath — Kata's
        #    virtiofs presents single-file subPath mounts as directories).
        - op: add
          path: /spec/podTemplate/spec/containers/0/volumeMounts/-
          value:
            name: bal-instrumentation-config
            mountPath: ${parameters.configMountDir}
            readOnly: true

        # 4. Make Ballerina load both config files; am-instrumentation.toml by
        #    absolute path, Config.toml relative to the app working directory.
        - op: add
          path: /spec/podTemplate/spec/containers/0/env/-
          value:
            name: BAL_CONFIG_FILES
            value: "${parameters.configMountDir}/am-instrumentation.toml:Config.toml"
