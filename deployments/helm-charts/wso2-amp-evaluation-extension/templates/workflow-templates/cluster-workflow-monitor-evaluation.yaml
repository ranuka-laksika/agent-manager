apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: amp-monitor-evaluation
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
  labels:
{{- include "amp-evaluation-extension.labels" . | nindent 4 }}
spec:
  entrypoint: run-monitor
  arguments:
    parameters:
      - name: monitor-name
      - name: organization
      - name: project
      - name: agent
      - name: environment
      - name: evaluators
      - name: sampling-rate
        value: "1.0"
      - name: trace-start
      - name: trace-end
      - name: traces-api-endpoint
      - name: monitor-id
      - name: run-id
      - name: publisher-endpoint
      - name: llm-proxy-secret-name
        value: "no-llm-proxy-configured"
      - name: llm-api-base
        value: ""
      - name: idp-token-url
      - name: idp-client-id
      - name: publisher-secret-name
  templates:
    - name: run-monitor
      container:
        image: '{{ include "amp-evaluation-extension.image" . }}'
        imagePullPolicy: {{ .Values.ampEvaluation.image.pullPolicy }}
        command: ["python", "main.py"]
        args:
          - '--monitor-name={{ "{{" }}workflow.parameters.monitor-name{{ "}}" }}'
          - '--organization={{ "{{" }}workflow.parameters.organization{{ "}}" }}'
          - '--project={{ "{{" }}workflow.parameters.project{{ "}}" }}'
          - '--agent={{ "{{" }}workflow.parameters.agent{{ "}}" }}'
          - '--environment={{ "{{" }}workflow.parameters.environment{{ "}}" }}'
          - '--evaluators={{ "{{" }}workflow.parameters.evaluators{{ "}}" }}'
          - '--sampling-rate={{ "{{" }}workflow.parameters.sampling-rate{{ "}}" }}'
          - '--trace-start={{ "{{" }}workflow.parameters.trace-start{{ "}}" }}'
          - '--trace-end={{ "{{" }}workflow.parameters.trace-end{{ "}}" }}'
          - '--traces-api-endpoint={{ "{{" }}workflow.parameters.traces-api-endpoint{{ "}}" }}'
          - '--monitor-id={{ "{{" }}workflow.parameters.monitor-id{{ "}}" }}'
          - '--run-id={{ "{{" }}workflow.parameters.run-id{{ "}}" }}'
          - '--publisher-endpoint={{ "{{" }}workflow.parameters.publisher-endpoint{{ "}}" }}'
        env:
          - name: LLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: '{{ "{{" }}workflow.parameters.llm-proxy-secret-name{{ "}}" }}'
                key: LLM_API_KEY
                optional: true
          - name: LLM_API_BASE
            value: '{{ "{{" }}workflow.parameters.llm-api-base{{ "}}" }}'
          - name: IDP_TOKEN_URL
            value: '{{ "{{" }}workflow.parameters.idp-token-url{{ "}}" }}'
          - name: IDP_CLIENT_ID
            value: '{{ "{{" }}workflow.parameters.idp-client-id{{ "}}" }}'
          - name: IDP_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: '{{ "{{" }}workflow.parameters.publisher-secret-name{{ "}}" }}'
                key: client-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
  ttlStrategy:
    secondsAfterCompletion: 3600
