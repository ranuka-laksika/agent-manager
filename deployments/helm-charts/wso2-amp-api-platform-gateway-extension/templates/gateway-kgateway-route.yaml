---
# HTTPRoute: Catch-all route for this gateway's hostname on kgateway.
# Routes all traffic matching the gateway hostname (e.g. default-default.gateway.localhost)
# to the platform gateway runtime service. This enables LLM proxy, OTEL, and any other
# platform gateway traffic to flow through kgateway without needing per-path routes.
#
# The route lives in the kgateway's namespace (where the shared gateway-default
# Gateway is provisioned by the OpenChoreo data-plane chart), NOT in
# apiGateway.namespace: a same-namespace parentRef needs no allowedRoutes
# changes on a Gateway this chart does not own. The backendRef crosses into
# apiGateway.namespace, which the ReferenceGrant below permits.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}-gw-route
  namespace: {{ .Values.kgateway.namespace }}
  labels:
    {{- include "wso2-amp-gateway-extension.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-route
spec:
  parentRefs:
    - name: {{ .Values.kgateway.name }}
      namespace: {{ .Values.kgateway.namespace }}
  hostnames:
    - {{ include "wso2-amp-gateway-extension.gatewayHostname" . | quote }}
  rules:
    - backendRefs:
        - name: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}-gateway-gateway-runtime
          namespace: {{ .Values.apiGateway.namespace }}
          port: 22893
      timeouts:
        request: 30s
{{- if ne .Values.apiGateway.namespace .Values.kgateway.namespace }}
---
# ReferenceGrant: Gateway API blocks cross-namespace backendRefs unless the
# TARGET namespace explicitly grants them. This grant (in the gateway runtime's
# namespace) allows the HTTPRoute above (in the kgateway namespace) to reference
# Services here. Only rendered when the two namespaces actually differ.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}-gw-route-grant
  namespace: {{ .Values.apiGateway.namespace }}
  labels:
    {{- include "wso2-amp-gateway-extension.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-route
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.kgateway.namespace }}
  to:
    - group: ""
      kind: Service
{{- end }}
