# Default values for agent-management-platform
global:
  imagePullSecrets: []
  storageClass: ""

# PostgreSQL Database Configuration
postgresql:
  enabled: true
  external:
    host: ""
    port: 5432
    database: agentmanager
    username: agentmanager
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: "password"
  # Image configuration - use stable PostgreSQL 16 image
  auth:
    database: agentmanager
    username: agentmanager
    password: "agentmanager"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m

# OpenChoreo ingress configuration — routes the Console and Agent Manager API
# through the OpenChoreo control-plane kgateway (gateway-default) so they do
# not need their own LoadBalancer services.
ocIngress:
  enabled: true
  gatewayName: gateway-default
  gatewayNamespace: openchoreo-control-plane

# Agent Manager Service Configuration
agentManagerService:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/wso2/amp-api
    tag: "0.0.0-dev"
    pullPolicy: IfNotPresent

  # Reachable externally via the control-plane gateway (see ocIngress);
  # set type to LoadBalancer to restore a dedicated external endpoint.
  service:
    type: ClusterIP
    port: 9000
    targetPort: 8080
    annotations: {}

  # Internal gateway-management (xDS) endpoint. In-cluster AI gateways reach
  # it via cluster DNS; set type to LoadBalancer only when external gateways
  # must connect from outside the cluster.
  gatewayMgtService:
    type: ClusterIP
    port: 9243
    targetPort: 9243

  # Hostname the API is served on via the OpenChoreo control-plane gateway
  # (see the top-level ocIngress block)
  ocIngress:
    hostname: api.amp.localhost
    # Gateway request timeout for API routes; /mcp streams are exempt (no timeout)
    requestTimeout: 60s
    # Exposes the gateway-management (xDS/WebSocket) endpoint through the
    # control-plane gateway so external AI gateways connect without a
    # dedicated LoadBalancer. The WebSocket stays healthy behind the gateway
    # because the server pings every connection every 20s.
    gatewayMgmt:
      enabled: true
      # Hostnames external gateways use. host.docker.internal serves gateways
      # started via the console's Docker quick start on the same machine.
      hostnames:
        - cp.amp.localhost
        - host.docker.internal
      # ConfigMap holding the CA (key ca.crt) that validates the endpoint's
      # TLS certificate on the gateway->service hop. Published automatically
      # by the tls-certs job; set this when certificates.certificatesSecret
      # supplies your own certificate.
      caConfigMapName: ""

  # Internal server configuration
  internalServer:
    # Enable TLS for the internal server. When false, serves plain HTTP.
    tlsEnabled: true

  observer:
    url: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
    username: "admin"
    password: "admin"

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: ~

  # Health checks
  livenessProbe:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10

  # Application configuration
  config:
    serverHost: "0.0.0.0"
    logLevel: "INFO"
    autoMaxProcsEnabled: "true"
    authHeader: "Authorization"
    dbOperationTimeout: 30
    healthCheckTimeout: 5
    corsAllowedOrigin: "*"
    # Enable RBAC enforcement on all routes
    rbacEnabled: "true"
    observerURL: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
    # In-cluster URL the agent-manager-service uses to query trace data server-side.
    traceObserverURL: "http://amp-traces-observer.openchoreo-observability-plane.svc.cluster.local:9098"
    # Externally reachable trace observer URL returned to out-of-cluster clients
    # (e.g. the CLI) via /v1/config. Leave empty to inherit the console's URL
    # (console.config.obsApiBaseUrl) so the CLI and console use the same endpoint.
    traceObserverPublicURL: ""


    # TLS Configuration
    tlsEnabled: false
  
    # API Key configuration
    apiKey:
      header: "X-API-Key"
      value: "abc-def-123"
      existingSecret: ""
      existingSecretKey: "api-key"

    # Encryption key for secrets at rest (hex-encoded 32-byte AES-256 key)
    # Must be exactly 64 hex characters. Auto-generated if not provided.
    encryptionKey:
      value: ""
      existingSecret: ""
      existingSecretKey: "encryption-key"

    # Kubeconfig (empty for in-cluster, or provide config)
    kubeconfig: ""

    # OpenTelemetry configuration
    otel:
      traceContent: "true"
      # kgateway-routed vhost ("<env>-<org>.gateway.localhost") — independent of
      # the namespace the api-platform gateway runtime is deployed in.
      exporterEndpoint: "http://default-default.gateway.localhost:19080/otel"
      # Platform default AMP instrumentation version. Must exist in the
      # effective catalog (embedded baseline ∪ additionalInstrumentationVersions);
      # otherwise the server fails to start.
      defaultInstrumentationVersion: "0.4.0"
      # Operator-supplied catalog extension entries, added on top of the
      # bundled baseline. For air-gapped installs, point imageRepository
      # at the internal mirror.
      # Example:
      #   - version: "0.4.0"
      #     traceloopSdk: "0.65.0"
      #     pythonVersions: ["3.10","3.11","3.12","3.13"]
      #     imageRepository: "my-mirror.example/amp-python-instrumentation-provider"
      additionalInstrumentationVersions: []

    # Key Manager configuration
    keyManager:
      issuer: "http://thunder.amp.localhost:8080"
      audience: "amp,amp-console-client,amp-api-client,amp-publisher-*,amctl,am-mcp"
      jwksUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/jwks"

    # Externally reachable base URL of this service.
    # Used as the `resource` identifier in RFC 9728 protected resource metadata.
    # Routed through the OpenChoreo control-plane gateway (see ocIngress).
    serverPublicURL: "http://api.amp.localhost:8080"

    # Comma-separated list of OAuth 2.0 authorization server URLs advertised
    # in RFC 9728 protected resource metadata. Each entry must be an absolute
    # http/https URL. Validated at startup. Required for the well-known
    # endpoint to serve.
    oauthAuthorizationServers: "http://thunder.amp.localhost:8080"

    # Domain suffix env-Thunder developer-facing hostnames are built from:
    # "<org>-<env>.thunder.<thunderHostBaseDomain>". Override on custom-domain /
    # sslip.io installs so the reported identity-provider endpoints match the
    # actual env-Thunder hosts.
    thunderHostBaseDomain: "amp.localhost"

    # Comma-separated list of OAuth 2.0 scopes supported by this resource,
    # advertised in RFC 9728 protected resource metadata.
    oauthScopesSupported: "amp:llm-proxy:deploy,amp:mcp-server:create,amp:org:invite-member,amp:role:delete,amp:monitor:read,amp:agent:deploy-production,amp:git-secret:delete,amp:llm-provider:delete,amp:mcp-server:configure-guardrail,amp:agent:promote,amp:deployment-pipeline:create,amp:deployment-pipeline:read,amp:deployment-pipeline:update,amp:deployment-pipeline:delete,amp:gateway:delete,amp:group:delete,amp:llm-proxy:update,amp:monitor:score-read,amp:llm-provider-template:update,amp:agent:build,amp:agent:rollback,amp:agent:token-manage,amp:evaluator:read,amp:llm-provider-template:read,amp:monitor:create,amp:agent:suspend,amp:gateway:token-manage,amp:git-secret:read,amp:mcp-server:connect,amp:mcp-server:api-key-manage,amp:mcp-server:read,amp:observability:project-dashboard,amp:group:create,amp:observability:org-dashboard,amp:org:remove-member,amp:agent:deploy-non-production,amp:group:read,amp:llm-provider-template:create,amp:project:delete,amp:agent:create,amp:evaluator:create,amp:llm-provider:read,amp:org:modify-settings,amp:catalog:read,amp:environment:update,amp:group:update,amp:llm-proxy:delete,amp:project:read,amp:data-plane:read,amp:agent:read,amp:environment:read,amp:llm-provider:configure-guardrail,amp:observability:guardrail-metric,amp:org:assign-role,amp:project:update,amp:mcp-server:delete,amp:environment:delete,amp:evaluator:update,amp:git-secret:create,amp:monitor:execute,amp:llm-provider:api-key-manage,amp:gateway:read,amp:agent:update,amp:llm-provider-template:delete,amp:monitor:delete,amp:org:view,amp:llm-provider:create,amp:mcp-server:update,amp:org:manage-idp,amp:role:read,amp:role:update,amp:agent:delete,amp:gateway:create,amp:llm-provider:deploy,amp:llm-proxy:api-key-manage,amp:monitor:update,amp:org:manage-service-account,amp:role:create,amp:evaluator:delete,amp:llm-provider:connect,amp:llm-provider:update,amp:llm-proxy:read,amp:monitor:score-publish,amp:observability:infra-metric,amp:project:create,amp:repository:read,amp:gateway:update,amp:environment:create,amp:llm-proxy:create,amp:agent:api-key-manage,amp:agent-kind:read,amp:agent-kind:create,amp:agent-kind:update,amp:agent-kind:delete,amp:profile:read,amp:profile:update-attributes,amp:scope:create,amp:scope:read,amp:scope:update,amp:scope:delete,amp:agent-identity:read,amp:agent-identity:create,amp:agent-identity:update,amp:agent-identity:delete"

    # On-premise deployment flag
    isOnPremDeployment: "true"

    # OIDC configuration for Thunder integration
    oidc:
      tokenUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/token"
      clientId: "amp-api-client"
      clientSecret: "amp-api-client-secret"
    # JWT Signing configuration
    jwtSigning:
      privateKeyPath: "/app/keys/private.pem"
      publicKeysConfig: "/app/keys/public-keys-config.json"
      activeKeyId: "key-1"
      defaultExpiry: "8760h"
      issuer: "agent-manager-service"
      defaultEnvironment: "default"
    # GitHub configuration for repository API access
    github:
      token: ""
      existingSecret: ""
      existingSecretKey: "github-token"
    
    # OpenChoreo API configuration
    openChoreo:
      baseURL: "http://openchoreo-api.openchoreo-control-plane:8080"

    # Secret Manager configuration
    secretManager:
      provider: "openbao"
      baseURL: ""

    # OpenBao KV store configuration (for user deployment secrets)
    openbao:
      # OpenBao URL (uses the default OpenBao that comes with OpenChoreo)
      url: "http://openbao.openbao.svc.cluster.local:8200"
      # KV secrets engine path
      path: "secret"
      version: "v2"
      # OpenBao token (for dev mode, use "root"). When set, it is stored in the
      # chart-managed Secret and injected via secretKeyRef — never as a plaintext
      # env var in the pod spec.
      # For production, use existingSecret to reference an externally-managed
      # Secret containing the token instead.
      token: "root"
      existingSecret: ""
      # Key to read from existingSecret. Applies ONLY when existingSecret is set;
      # the chart-managed Secret always uses the fixed key "openbao-token".
      existingSecretKey: "openbao-token"

    # Workflow Plane OpenBao configuration (for Git Secrets)
    # Used to fetch git credentials for private repository access
    workflowPlaneOpenbao:
      # Workflow plane OpenBao URL
      url: "http://openbao.openbao.svc.cluster.local:8200"
      # OpenBao token. When set, it is stored in the chart-managed Secret and
      # injected via secretKeyRef — never as a plaintext env var in the pod spec.
      # For production, use existingSecret instead.
      token: "root"
      existingSecret: ""
      # Key to read from existingSecret. Applies ONLY when existingSecret is set.
      # The chart-managed Secret packs both OpenBao tokens into one Secret, so this
      # token is stored there under the distinct key "workflow-plane-openbao-token".
      existingSecretKey: "openbao-token"

    # Agent resource limits — operator-configured upper bounds enforced on PUT /resource-configs
    perAgentResourceLimits:
      maxReplicas: 10
      maxCPU: "500m"
      maxMemory: "512Mi"

    # Thunder admin API configuration (for per-org publisher credential provisioning)
    # When baseURL is empty, the static amp-publisher-client credentials are used.
    thunder:
      # Thunder API base URL
      baseURL: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090"
      # OAuth2 client ID of the system app (with Administrator role)
      clientId: "amp-system-client"
      # OAuth2 client secret of the system app
      clientSecret: "amp-system-client-secret"
      # Reference to an existing secret containing the Thunder client secret
      existingSecret: ""
      existingSecretKey: "thunder-client-secret"
  # Certificate configuration
  certificates:
    # REQUIRED: Kubernetes secret name containing TLS certificates
    # Expected keys in secret: cert.pem (certificate), key.pem (private key)
    # Example creation:
    #   kubectl create secret generic amp-tls-certs \
    #     --from-file=cert.pem=/path/to/cert.pem \
    #     --from-file=key.pem=/path/to/key.pem
    # For development, leave empty to generate self-signed certs at runtime (insecure)
    certificatesSecret: ""

  agentWorkload:
    cors:
      allowedOrigin: "*"
      allowedMethods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allowedHeaders: "authorization,Content-Type,Origin,X-API-Key"
      allowCredentials: false

  # Pod-level configurations
  podAnnotations: {}
  podLabels: {}
  # Pod security context - defaults to fsGroup: 1000 if not specified
  # Note: If you encounter "too many open files" errors, this is typically caused by
  # the Kubernetes client watching too many resources. Consider:
  # 1. Reducing the number of watched resources in the application
  # 2. Implementing resource filtering in watchers
  # 3. Increasing limits at the node/cluster level
  podSecurityContext: {}
  # Container security context - defaults to secure settings if not specified
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Console (Frontend) Configuration
console:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/wso2/amp-console
    tag: "0.0.0-dev"
    pullPolicy: Always

  # Reachable externally via the control-plane gateway (see ocIngress);
  # set type to LoadBalancer to restore a dedicated external endpoint.
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  # Hostname the Console is served on via the OpenChoreo control-plane gateway
  # (see the top-level ocIngress block)
  ocIngress:
    hostname: console.amp.localhost

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: ~

  # Health checks
  livenessProbe: null
  readinessProbe: null

  # Frontend configuration
  config:
    # Authentication (set to "" to disable)
    auth:
      clientId: "amp-console-client"
      baseUrl: "http://thunder.amp.localhost:8080"
      scopes: "openid profile email amp:llm-proxy:deploy amp:mcp-server:create amp:org:invite-member amp:role:delete amp:monitor:read amp:agent:deploy-production amp:git-secret:delete amp:llm-provider:delete amp:mcp-server:configure-guardrail amp:agent:promote amp:deployment-pipeline:create amp:deployment-pipeline:read amp:deployment-pipeline:update amp:deployment-pipeline:delete amp:gateway:delete amp:group:delete amp:llm-proxy:update amp:monitor:score-read amp:llm-provider-template:update amp:agent:build amp:agent:rollback amp:agent:token-manage amp:evaluator:read amp:llm-provider-template:read amp:monitor:create amp:agent:suspend amp:gateway:token-manage amp:git-secret:read amp:mcp-server:connect amp:mcp-server:api-key-manage amp:mcp-server:read amp:observability:project-dashboard amp:group:create amp:observability:org-dashboard amp:org:remove-member amp:agent:deploy-non-production amp:group:read amp:llm-provider-template:create amp:project:delete amp:agent:create amp:evaluator:create amp:llm-provider:read amp:org:modify-settings amp:catalog:read amp:environment:update amp:group:update amp:llm-proxy:delete amp:project:read amp:data-plane:read amp:agent:read amp:environment:read amp:llm-provider:configure-guardrail amp:observability:guardrail-metric amp:org:assign-role amp:project:update amp:mcp-server:delete amp:environment:delete amp:evaluator:update amp:git-secret:create amp:monitor:execute amp:llm-provider:api-key-manage amp:gateway:read amp:agent:update amp:llm-provider-template:delete amp:monitor:delete amp:org:view amp:llm-provider:create amp:mcp-server:update amp:org:manage-idp amp:role:read amp:role:update amp:agent:delete amp:gateway:create amp:llm-provider:deploy amp:llm-proxy:api-key-manage amp:monitor:update amp:org:manage-service-account amp:role:create amp:evaluator:delete amp:llm-provider:connect amp:llm-provider:update amp:llm-proxy:read amp:monitor:score-publish amp:observability:infra-metric amp:project:create amp:repository:read amp:gateway:update amp:environment:create amp:llm-proxy:create amp:agent:api-key-manage amp:agent-kind:read amp:agent-kind:create amp:agent-kind:update amp:agent-kind:delete amp:profile:read amp:profile:update-attributes amp:scope:create amp:scope:read amp:scope:update amp:scope:delete amp:agent-identity:read amp:agent-identity:create amp:agent-identity:update amp:agent-identity:delete"
      signInRedirectURL: "http://console.amp.localhost:8080/login"
      signOutRedirectURL: "http://console.amp.localhost:8080/login"
      existingSecret: ""
      validateIDToken: "false"
      clockTolerance: 300

    # Disable auth for development
    disableAuth: "false"
    # Enable RBAC-based sidebar visibility (scope-gated nav sections)
    rbacEnabled: "true"

    # Backend API URLs (will be auto-configured if empty)
    # Routed through the OpenChoreo control-plane gateway (see ocIngress).
    apiBaseUrl: "http://api.amp.localhost:8080"
    # Traces Observer Service URL — browser calls this directly for trace data.
    # Routed through the OpenChoreo observability-plane gateway.
    obsApiBaseUrl: "http://traces.amp.localhost:11080"
    # Gateway control plane URL rendered into external-gateway setup commands.
    # Routed through the OpenChoreo control-plane gateway (see
    # agentManagerService.ocIngress.gatewayMgmt); host.docker.internal lets a
    # gateway container on the same machine reach it.
    gatewayControlPlaneUrl: "http://host.docker.internal:8080"
    # Gateway version for setup commands (default: v1.0.0)
    gatewayVersion: "v1.0.0"
    # Agent Manager release version — pins the deployment-script git tag (amp/vX.Y.Z).
    # Placeholder is substituted with the real release version by the release
    # pipeline (.github/scripts/update-helm-charts.sh); dev builds fall back to main.
    ampVersion: "0.0.0-dev"
    # Trace-export URL shown to external agent developers. kgateway-routed
    # vhost — independent of the gateway runtime's namespace; no port-forward.
    instrumentationUrl: "http://default-default.gateway.localhost:19080/otel"
    # Cluster-internal URLs the API Platform Gateway uses to reach Agent
    # Manager when add-environment.sh installs a new gateway. The Create
    # Environment drawer pipes these into the rendered curl|bash command so
    # the gateway is configured for in-cluster service discovery.
    agentManagerInternalBaseUrl: "http://amp-api.wso2-amp.svc.cluster.local:9000"
    agentManagerInternalCpHost: "amp-api-gateway-manager.wso2-amp.svc.cluster.local:9243"
    # Guardrails catalog URL for fetching available guardrail policies
    guardrailsCatalogUrl: "https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies?categories=AI,Guardrails&limit=50"
    # Guardrails definition base URL for fetching policy definitions
    guardrailsDefinitionBaseUrl: "https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies"
    # Guardrail capability flags — enable policies that require external system configuration.
    # OOTB policies are always shown regardless of these flags.
    guardrailCapabilities:
      awsBedrock: false          # Unlocks: aws-bedrock-guardrail
      azureContentSafety: false  # Unlocks: azure-content-safety-content-moderation
      graniteGuardian: false     # Unlocks: granite-guardian-prompt-injection
      nemoGuard: false           # Unlocks: nvidia-nemoguard-content-safety
      semanticGuardrails: false  # Unlocks: semantic-prompt-guard, semantic-cache
    # Feature flags.
    featureFlags:
      # Shows the private Git repository option when building agents from source.
      enablePrivateRepoSupport: true
      # When true, identity provider management calls the REST API directly instead
      # of rendering the self-hosted manage-identity-provider.sh script snippet.
      enableIdentityProviderManagedMode: false
      # When false, the Profile Settings text fields and Save Changes button are
      # hidden/disabled, and the Change Password tab is disabled.
      enableProfileManagement: true
      # When false, the Add User, Invite User, Create Role, and Create Group
      # buttons on the Settings page are disabled.
      enableUserManagement: true

  # Pod-level configurations
  podAnnotations: {}
  podLabels: {}
  # Pod security context - optional, no defaults to allow image to use its own user
  # If you need to set fsGroup or other pod-level security settings, specify them here
  podSecurityContext: {}
  # Container security context - defaults to secure settings (without runAsUser to allow image default)
  # If you need to set runAsUser or other container-level security settings, specify them here
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Database Migration Job Configuration
dbMigration:
  enabled: true

  image:
    repository: ghcr.io/wso2/amp-api
    tag: "0.0.0-dev"
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
      
  backoffLimit: 3
  podSecurityContext: {}
  securityContext: {}

# JWT Keys Generation Job Configuration
jwtKeysGeneration:
  enabled: true
  backoffLimit: 3

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  # Security context for JWT keys generation job
  # Allows root access for apk package installation (openssl, kubectl)
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    fsGroup: 0
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

# TLS Certificates Generation Job Configuration
tlsCertsGeneration:
  enabled: true
  backoffLimit: 3

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  # Security context for TLS certs generation job
  # Allows root access for apk package installation (openssl, kubectl)
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    fsGroup: 0
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

# JWT Signing Keys Configuration
jwtSigning:
  # Specify an existing secret containing JWT keys (optional)
  # If not specified, keys will be auto-generated by the jwt-keys-generation job
  existingSecret: ""

# Ingress Configuration
# ServiceAccount Configuration
serviceAccount:
  create: true
  name: "agent-management-platform"
  annotations: {}
  automount: false

# RBAC Configuration
# Scoped to exactly what the pre-install/pre-upgrade hook Jobs (TLS certs,
# JWT keys) do: read/create/patch Secrets in the release namespace. The
# amp-api service itself makes no Kubernetes API calls.
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get", "create", "patch"]
    # The tls-certs hook also publishes the gateway-management CA as a ConfigMap
    # (amp-api-gateway-mgmt-ca) for the control-plane gateway's BackendTLSPolicy;
    # kubectl apply needs get + create/patch on configmaps.
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "create", "patch"]

# ServiceAccount used only by the pre-install/pre-upgrade hook Jobs.
# This is the sole subject of the scoped RBAC Role. The SA and the
# Role/RoleBinding are only rendered when at least one hook Job is enabled,
# so no unused grant is left standing. With create: false, name must point
# at an existing ServiceAccount (rendering fails fast otherwise).
hookServiceAccount:
  create: true
  name: ""   # defaults to "<fullname>-hooks" (e.g. amp-hooks)
  annotations: {}

# Global volume mounts and volumes (optional)
volumeMounts: []
volumes: []

# Common labels to add to all resources
commonLabels: {}
