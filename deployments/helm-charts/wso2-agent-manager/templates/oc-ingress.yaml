{{- if .Values.ocIngress.enabled }}
---
# ReferenceGrant to allow HTTPRoutes in the OpenChoreo control-plane gateway
# namespace to reference the amp-console / amp-api Services in this namespace
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .Release.Name }}-oc-ingress-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-management-platform.labels" . | nindent 4 }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.ocIngress.gatewayNamespace }}
  to:
    - group: ""
      kind: Service
{{- if .Values.console.enabled }}
---
# HTTPRoute in the gateway namespace to route traffic to the Console.
# This is required because the gateway-default Gateway only allows HTTPRoutes
# from the same namespace (same pattern as the Thunder extension).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-console
  namespace: {{ .Values.ocIngress.gatewayNamespace }}
  labels:
    {{- include "agent-management-platform.console.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.console.ocIngress.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ocIngress.gatewayName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: amp-console
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.console.service.port }}
          weight: 1
{{- end }}
{{- if .Values.agentManagerService.enabled }}
---
# HTTPRoute in the gateway namespace to route traffic to the Agent Manager API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.ocIngress.gatewayNamespace }}
  labels:
    {{- include "agent-management-platform.agentManagerService.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.agentManagerService.ocIngress.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ocIngress.gatewayName }}
  rules:
    # /mcp carries long-lived MCP streamable-HTTP/SSE sessions; a zero request
    # timeout disables the gateway timeout for these streams
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      timeouts:
        request: 0s
      backendRefs:
        - group: ""
          kind: Service
          name: amp-api
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.agentManagerService.service.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: {{ .Values.agentManagerService.ocIngress.requestTimeout | default "60s" }}
      backendRefs:
        - group: ""
          kind: Service
          name: amp-api
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.agentManagerService.service.port }}
          weight: 1
{{- /* Nil-safe defaults so upgrades with --reuse-values (which do not merge
       new chart defaults) still render the gateway-mgmt route. */}}
{{- $gwMgmt := (.Values.agentManagerService.ocIngress).gatewayMgmt | default dict }}
{{- $gwMgmtEnabled := hasKey $gwMgmt "enabled" | ternary $gwMgmt.enabled true }}
{{- if $gwMgmtEnabled }}
---
# HTTPRoute in the gateway namespace to route external AI gateways to the
# gateway-management (xDS/WebSocket) endpoint
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-gateway-mgmt
  namespace: {{ .Values.ocIngress.gatewayNamespace }}
  labels:
    {{- include "agent-management-platform.agentManagerService.labels" . | nindent 4 }}
spec:
  hostnames:
    {{- range ($gwMgmt.hostnames | default (list "cp.amp.localhost" "host.docker.internal")) }}
    - {{ . }}
    {{- end }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ocIngress.gatewayName }}
  rules:
    # The config-push WebSocket is a long-lived connection; a zero duration
    # disables the gateway request timeout. Idle timeouts never fire on it
    # because the server pings every 20s.
    - matches:
        - path:
            type: PathPrefix
            value: /api/internal/v1/ws
      timeouts:
        request: 0s
      backendRefs:
        - group: ""
          kind: Service
          name: amp-api-gateway-manager
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.agentManagerService.gatewayMgtService.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: {{ .Values.agentManagerService.ocIngress.requestTimeout | default "60s" }}
      backendRefs:
        - group: ""
          kind: Service
          name: amp-api-gateway-manager
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.agentManagerService.gatewayMgtService.port }}
          weight: 1
{{- if .Values.agentManagerService.internalServer.tlsEnabled }}
---
# The gateway-management endpoint serves TLS, so the gateway must re-encrypt
# on the route->backend hop and validate against the endpoint's certificate
# (published as a ConfigMap by the tls-certs job)
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ .Release.Name }}-gateway-mgmt-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-management-platform.agentManagerService.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: amp-api-gateway-manager
  validation:
    hostname: amp-api-gateway-manager.{{ .Release.Namespace }}.svc.cluster.local
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: {{ $gwMgmt.caConfigMapName | default (printf "%s-gateway-mgmt-ca" (include "agent-management-platform.agentManagerService.fullname" .)) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
