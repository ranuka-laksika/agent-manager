{{- if and .Values.rbac.create (include "agent-management-platform.hookJobsEnabled" .) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-management-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-management-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
{{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent-management-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-management-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent-management-platform.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-management-platform.hookServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
