# Traces Observer Service config
tracesObserver:
  enabled: true
  developmentMode: false
  name: amp-traces-observer
  replicaCount: 1
  image:
    repository: ghcr.io/wso2/amp-traces-observer
    tag: "v0.13.0-rc3"
    pullPolicy: IfNotPresent
  port: 9098
  resourceLimits:
    memory: 256Mi
    cpu: 500m
  resourceRequests:
    memory: 128Mi
    cpu: 250m
  service:
    type: LoadBalancer
  # Observer Service connection — the upstream service that provides trace data.
  observer:
    baseUrl: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
    idpTokenUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/token"
    idpClientId: "amp-api-client"
    idpClientSecret: "amp-api-client-secret"
  # JWT authentication — must match the agent-manager keyManager config so the
  # same user token issued by Thunder is accepted by both services.
  auth:
    isLocalDevEnv: false
    jwksUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/jwks"
    issuer: "http://thunder.amp.localhost:8080"
    audience: "amp-console-client,amp-api-client,amp-publisher-client"
