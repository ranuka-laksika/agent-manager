# Agent Manager Observer Service config
amObserver:
  enabled: true
  developmentMode: false
  name: amp-observer
  replicaCount: 1
  image:
    repository: ghcr.io/wso2/amp-observer
    tag: "0.0.0-dev"
    pullPolicy: IfNotPresent
  port: 9098
  resourceLimits:
    memory: 256Mi
    cpu: 500m
  resourceRequests:
    memory: 128Mi
    cpu: 250m
  # Reachable externally via the observability-plane gateway (see ocIngress);
  # set type to LoadBalancer to restore a dedicated external endpoint.
  service:
    type: ClusterIP
  # Exposes the Agent Manager Observer through the observability-plane kgateway
  # (gateway-default) so it does not need its own LoadBalancer service.
  ocIngress:
    enabled: true
    gatewayName: gateway-default
    hostname: traces.amp.localhost
    requestTimeout: 60s
  # Observer Service connection — the upstream service that provides trace data.
  observer:
    baseUrl: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
    idpTokenUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/token"
    idpClientId: "amp-api-client"
    idpClientSecret: "amp-api-client-secret"
    defaultNamespace: "default"
  # JWT authentication — must match the agent-manager keyManager config so the
  # same user token issued by Thunder is accepted by both services. Thunder
  # (v0.45+) stamps the resource-server identifier "amp" as the token audience,
  # so query tokens (console/CLI) carry aud=amp. The agent-manager-service's own
  # amp-api-client client-credentials token (used for the monitor-run-logs
  # server-to-server call) requests the full amp:* scope set and resolves to the
  # same "amp" resource-server audience; "amp-api-client" is listed too as a
  # defensive fallback for any client-credentials request that carries no scope
  # (in which case Thunder falls back to the client ID as the audience).
  # Publisher tokens (aud amp-publisher-*) are matched by a separate regex in
  # the observer's auth middleware and do not need to be listed here.
  auth:
    isLocalDevEnv: false
    jwksUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/jwks"
    issuer: "http://thunder.amp.localhost:8080"
    audience: "amp,amp-api-client"
  # Externally reachable base URL of this service.
  # Used as the `resource` identifier in RFC 9728 protected resource metadata
  # and in the WWW-Authenticate resource_metadata parameter on 401 responses.
  # Routed through the observability-plane gateway (see ocIngress above), which
  # k3d maps to host port 11080 — not the 8080 control-plane gateway.
  publicUrl: "http://traces.amp.localhost:11080"
  # OAuth 2.0 discovery metadata for MCP clients (RFC 9728). Consumed by the
  # /mcp route's protected-resource well-known endpoint; the observer itself
  # only authenticates tokens (no scope/claims enforcement).
  oauth:
    # Comma-separated list of OAuth 2.0 authorization server URLs advertised
    # in RFC 9728 protected resource metadata. Must match auth.issuer above.
    authorizationServers: "http://thunder.amp.localhost:8080"
    # Comma-separated list of OAuth 2.0 scopes supported by this resource,
    # advertised in RFC 9728 protected resource metadata.
    scopesSupported: "amp:observability:project-dashboard,amp:observability:org-dashboard,amp:observability:infra-metric,amp:observability:guardrail-metric"

# OpenTelemetry collector extras
otelCollector:
  # Collector container ports. Must match the receiver/extension endpoints in
  # deployments/values/oc-collector-configmap.yaml, which is applied separately
  # (not templated by this chart) — update both if either changes.
  otlpHttpPort: 4318
  healthCheckPort: 13133
  # Optional dedicated external Service for direct OTLP/HTTP pushes to the
  # collector. Disabled by default: shipped clients send traces through the
  # data-plane gateway's /otel route.
  externalService:
    enabled: false
    type: LoadBalancer
    port: 21893

networkPolicy:
  otelCollector:
    # No-op on clusters whose CNI doesn't enforce NetworkPolicy.
    enabled: true
