{{- if .Values.otelCollector.externalService.enabled }}
# Optional external endpoint for direct OTLP/HTTP pushes to the collector.
# Disabled by default: shipped clients send traces through the data-plane
# gateway's /otel route instead.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.otelCollector.externalService.type }}
  selector:
    app.kubernetes.io/name: opentelemetry-collector
  ports:
    - name: otlp-http
      port: {{ .Values.otelCollector.externalService.port }}
      targetPort: 4318
      protocol: TCP
{{- end }}
