{{- if .Values.tracesObserver.enabled }}
{{- if not .Values.tracesObserver.auth.isLocalDevEnv }}
  {{- if empty .Values.tracesObserver.auth.jwksUrl }}
    {{- fail "tracesObserver.auth.jwksUrl must be set when isLocalDevEnv is false. Provide the JWKS endpoint of your identity provider, or set tracesObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
  {{- if empty .Values.tracesObserver.auth.issuer }}
    {{- fail "tracesObserver.auth.issuer must be set when isLocalDevEnv is false. Provide the token issuer URL of your identity provider, or set tracesObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
  {{- if empty .Values.tracesObserver.auth.audience }}
    {{- fail "tracesObserver.auth.audience must be set when isLocalDevEnv is false. Provide a comma-separated list of allowed audiences, or set tracesObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
{{- end }}
{{- if empty .Values.tracesObserver.observer.baseUrl }}
  {{- fail "tracesObserver.observer.baseUrl must be set. Provide the base URL of the Observer Service." }}
{{- end }}
{{- if empty .Values.tracesObserver.observer.idpTokenUrl }}
  {{- fail "tracesObserver.observer.idpTokenUrl must be set. Provide the IDP token endpoint for Observer Service authentication." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.tracesObserver.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.tracesObserver.replicaCount }}
  selector:
    matchLabels:
      app: traces-observer
  template:
    metadata:
      labels:
        app: traces-observer
    spec:
      containers:
        - name: traces-observer
          # if developmentMode is true, use latest image for easier debugging
          {{- if .Values.tracesObserver.developmentMode }}
          image: amp-traces-observer:0.0.0-dev
          {{- else }}
          image: {{ .Values.tracesObserver.image.repository }}:{{ .Values.tracesObserver.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.tracesObserver.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.tracesObserver.port }}
          env:
            - name: TRACES_OBSERVER_PORT
              value: "{{ .Values.tracesObserver.port }}"
            - name: OBSERVER_BASE_URL
              value: "{{ .Values.tracesObserver.observer.baseUrl }}"
            - name: IDP_TOKEN_URL
              value: "{{ .Values.tracesObserver.observer.idpTokenUrl }}"
            - name: OBSERVER_DEFAULT_NAMESPACE
              value: "{{ .Values.tracesObserver.observer.defaultNamespace }}"
            - name: IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: observer-idp-credentials
                  key: idpClientId
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: observer-idp-credentials
                  key: idpClientSecret
            # JWT auth — must match agent-manager keyManager config
            - name: IS_LOCAL_DEV_ENV
              value: "{{ .Values.tracesObserver.auth.isLocalDevEnv }}"
            - name: KEY_MANAGER_JWKS_URL
              value: "{{ .Values.tracesObserver.auth.jwksUrl }}"
            - name: KEY_MANAGER_ISSUER
              value: "{{ .Values.tracesObserver.auth.issuer }}"
            - name: KEY_MANAGER_AUDIENCE
              value: "{{ .Values.tracesObserver.auth.audience }}"
          resources:
            limits:
              memory: {{ .Values.tracesObserver.resourceLimits.memory }}
              cpu: {{ .Values.tracesObserver.resourceLimits.cpu }}
            requests:
              memory: {{ .Values.tracesObserver.resourceRequests.memory }}
              cpu: {{ .Values.tracesObserver.resourceRequests.cpu }}
{{- end }}
