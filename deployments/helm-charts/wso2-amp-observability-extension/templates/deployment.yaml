{{- if .Values.amObserver.enabled }}
{{- if not .Values.amObserver.auth.isLocalDevEnv }}
  {{- if empty .Values.amObserver.auth.jwksUrl }}
    {{- fail "amObserver.auth.jwksUrl must be set when isLocalDevEnv is false. Provide the JWKS endpoint of your identity provider, or set amObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
  {{- if empty .Values.amObserver.auth.issuer }}
    {{- fail "amObserver.auth.issuer must be set when isLocalDevEnv is false. Provide the token issuer URL of your identity provider, or set amObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
  {{- if empty .Values.amObserver.auth.audience }}
    {{- fail "amObserver.auth.audience must be set when isLocalDevEnv is false. Provide a comma-separated list of allowed audiences, or set amObserver.auth.isLocalDevEnv=true for local development only." }}
  {{- end }}
{{- end }}
{{- if empty .Values.amObserver.observer.baseUrl }}
  {{- fail "amObserver.observer.baseUrl must be set. Provide the base URL of the Observer Service." }}
{{- end }}
{{- if empty .Values.amObserver.observer.idpTokenUrl }}
  {{- fail "amObserver.observer.idpTokenUrl must be set. Provide the IDP token endpoint for Observer Service authentication." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.amObserver.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.amObserver.replicaCount }}
  selector:
    matchLabels:
      app: amp-observer
  template:
    metadata:
      labels:
        app: amp-observer
        app.kubernetes.io/component: observer
    spec:
      containers:
        - name: observer
          # if developmentMode is true, use latest image for easier debugging
          {{- if .Values.amObserver.developmentMode }}
          image: amp-observer:0.0.0-dev
          {{- else }}
          image: {{ .Values.amObserver.image.repository }}:{{ .Values.amObserver.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.amObserver.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.amObserver.port }}
          env:
            - name: AM_OBSERVER_PORT
              value: "{{ .Values.amObserver.port }}"
            - name: OPENCHOREO_OBSERVER_URL
              value: "{{ .Values.amObserver.observer.baseUrl }}"
            - name: IDP_TOKEN_URL
              value: "{{ .Values.amObserver.observer.idpTokenUrl }}"
            - name: OBSERVER_DEFAULT_NAMESPACE
              value: "{{ .Values.amObserver.observer.defaultNamespace }}"
            - name: IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: observer-idp-credentials
                  key: idpClientId
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: observer-idp-credentials
                  key: idpClientSecret
            # JWT auth — must match agent-manager keyManager config
            - name: IS_LOCAL_DEV_ENV
              value: "{{ .Values.amObserver.auth.isLocalDevEnv }}"
            - name: KEY_MANAGER_JWKS_URL
              value: "{{ .Values.amObserver.auth.jwksUrl }}"
            - name: KEY_MANAGER_ISSUER
              value: "{{ .Values.amObserver.auth.issuer }}"
            - name: KEY_MANAGER_AUDIENCE
              value: "{{ .Values.amObserver.auth.audience }}"
            # OAuth 2.0 protected-resource metadata (RFC 9728) for MCP clients
            - name: SERVER_PUBLIC_URL
              value: "{{ .Values.amObserver.publicUrl }}"
            - name: OAUTH_AUTHORIZATION_SERVERS
              value: "{{ .Values.amObserver.oauth.authorizationServers }}"
            - name: OAUTH_SCOPES_SUPPORTED
              value: "{{ .Values.amObserver.oauth.scopesSupported }}"
          resources:
            limits:
              memory: {{ .Values.amObserver.resourceLimits.memory }}
              cpu: {{ .Values.amObserver.resourceLimits.cpu }}
            requests:
              memory: {{ .Values.amObserver.resourceRequests.memory }}
              cpu: {{ .Values.amObserver.resourceRequests.cpu }}
{{- end }}
