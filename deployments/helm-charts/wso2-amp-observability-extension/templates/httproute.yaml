{{- if and .Values.tracesObserver.enabled .Values.tracesObserver.ocIngress.enabled }}
# HTTPRoute exposing the Traces Observer through the observability-plane
# kgateway (gateway-default). This chart installs into the same namespace as
# that gateway, so no ReferenceGrant is needed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-traces
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: traces-observer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  hostnames:
    - {{ .Values.tracesObserver.ocIngress.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.tracesObserver.ocIngress.gatewayName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: {{ .Values.tracesObserver.ocIngress.requestTimeout | default "60s" }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.tracesObserver.name }}
          port: {{ .Values.tracesObserver.port }}
          weight: 1
{{- end }}
