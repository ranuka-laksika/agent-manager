{{- if .Values.networkPolicy.otelCollector.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector-gateway-only
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              openchoreo.dev/system-component: gateway-runtime
      ports:
        - protocol: TCP
          port: 4318
    - ports:
        - protocol: TCP
          port: 13133
{{- end }}
