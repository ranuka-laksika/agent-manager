{{- if .Values.thunder.ocIngress.https.enabled }}
{{- if .Values.thunder.ocIngress.https.createIssuer }}
# Self-signed bootstrap issuer (creates the root CA cert below).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: amp-local-selfsigned-issuer
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  selfSigned: {}
---
# Root CA certificate — issued by the self-signed issuer, stored in cert-manager
# namespace so the ClusterIssuer (amp-local-ca-issuer) below can read it.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: amp-local-root-ca
  namespace: cert-manager
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  isCA: true
  commonName: "AMP Local Dev CA"
  secretName: amp-local-root-ca-secret
  duration: 87600h
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: amp-local-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed ClusterIssuer — signs the Thunder TLS leaf certificate.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: amp-local-ca-issuer
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  ca:
    secretName: amp-local-root-ca-secret
---
{{- end }}
# TLS leaf certificate for thunder.amp.localhost.
# Created in openchoreo-control-plane so the Gateway there can reference it directly.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-local-tls
  namespace: openchoreo-control-plane
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  secretName: {{ .Release.Name }}-local-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - {{ .Values.thunder.ocIngress.hostname | quote }}
  issuerRef:
    name: amp-local-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Dedicated HTTPS Gateway for Thunder (port 8443, already mapped in k3d).
# Kept separate from gateway-default (port 8080) so we don't patch a resource
# managed by another chart.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-https-gateway
  namespace: openchoreo-control-plane
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  gatewayClassName: kgateway
  listeners:
    - name: https
      port: {{ .Values.thunder.ocIngress.https.port }}
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Release.Name }}-local-tls
            namespace: openchoreo-control-plane
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
