apiVersion: v2
name: wso2-amp-thunder-extension
description: A Helm chart to add Thunder Identity Provider functionality for the Agent Management Platform.
type: application
version: v1.0.0-alpha1
appVersion: "v1.0.0-alpha1"

keywords:
  - wso2
  - ai
  - agent-management
  - ai-agents
  - identity-provider

maintainers:
  - name: WSO2
    url: https://wso2.com

dependencies:
  - name: thunderid
    alias: thunder
    condition: thunder.enabled
    repository: oci://ghcr.io/thunder-id/helm-charts
    version: "0.45.0"
