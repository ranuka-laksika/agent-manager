apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
# runsc is the gVisor runtime handler name registered in containerd
# (runtime_type io.containerd.runsc.v1).
handler: runsc
# scheduling automatically injects the nodeSelector and toleration into any pod
# that sets runtimeClassName: gvisor, so agent workloads (the SandboxTemplate pod
# spec) only need to set runtimeClassName — node affinity is handled here.
#
# The matching node must be labeled `gvisor=true` and tainted
# `gvisor=true:NoSchedule` (see setup-gvisor-node.sh / install-gvisor.sh). The
# taint keeps non-gVisor (runc) pods off the node; the toleration below lets
# gVisor pods land on it.
scheduling:
  nodeSelector:
    gvisor: "true"
  tolerations:
    - key: "gvisor"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
