apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
# kata-qemu is the runtime handler that kata-deploy registers in containerd for the
# QEMU hypervisor (runtime_type io.containerd.kata-qemu.v2). Each pod that selects this
# RuntimeClass boots in its own lightweight VM with a dedicated guest kernel — there is
# no shared kernel with the host (stronger than gVisor's userspace kernel).
handler: kata-qemu
# scheduling auto-injects the nodeSelector and toleration into any pod that sets
# runtimeClassName: kata-qemu, so the agent-api SandboxTemplate only needs to set
# runtimeClassName — node affinity is handled here (mirrors the gvisor RuntimeClass).
#
# The matching node must be labeled `kata=true` and tainted `kata=true:NoSchedule`
# (see setup-kata-node.sh / install-kata.sh) and must have nested virtualization
# (KVM) available. The taint keeps non-Kata (runc) pods off the node; the toleration
# below lets Kata pods land on it.
scheduling:
  nodeSelector:
    kata: "true"
  tolerations:
    - key: "kata"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
