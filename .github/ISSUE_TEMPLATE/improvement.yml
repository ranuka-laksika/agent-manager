name: "🚀 Improvement Request"
description: Suggest an improvement to the product.
title: "[Improvement]: "
labels: ["Type/Improvement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Please select the area the issue is related to
      multiple: true
      options:
        - Area/AgentManagement (Agents, agent configurations, kinds, agent API keys)
        - Area/Console (Web UI, portal, frontend)
        - Area/Deployments (Deployments, environments, infra resources)
        - Area/LLMProviders (LLM providers, LLM proxy, LLM configuration)
        - Area/Gateways (Gateway integration, API catalog, routing)
        - Area/Observability (Traces observer, telemetry, instrumentation runtime)
        - Area/Evaluation (Evaluation jobs, evaluators)
        - Area/ProjectsOrgs (Projects, organizations, multi-tenancy, RBAC)
        - Area/Instrumentation (AMP instrumentation libs, auto-instrumentation)
        - Area/Other (Anything else which does not match above categories)
    validations:
      required: true
  - type: dropdown
    id: aspect
    attributes:
      label: Please select the aspect the issue is related to
      multiple: true
      options:
        - Aspect/API (API backends, definitions, contracts, interfaces, OpenAPI)
        - Aspect/UI (Frontend layouts, components, styling)
        - Aspect/Configuration (Config files, settings, env vars, defaults)
        - Aspect/Logging (Log formats, instrumentation, improvements)
        - Aspect/Monitoring (Metrics, observability, health checks, alerts)
        - Aspect/Performance (Latency, optimizations, load issues)
        - Aspect/Security (AuthN/AuthZ, secrets, tenant isolation, vulnerabilities)
        - Aspect/Testing (Test coverage, integration tests)
        - Aspect/AI (AI/LLM integration, MCP, AI readiness)
        - Aspect/UX (User experience, flows, usability, clarity)
        - Aspect/Other (Anything else which does not match above categories)
    validations:
      required: true
  - type: textarea
    id: suggested_improvement
    attributes:
      label: Suggested Improvement
      description: Describe the current limitation and the improvement you suggest.
    validations:
      required: true
  - type: input
    id: related_issues
    attributes:
      label: Related Issues
      description: Link any related issues or pull requests.
    validations:
      required: false
