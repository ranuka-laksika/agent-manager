name: "🐞 Report a Bug"
description: Create an issue if something does not work as expected.
title: "[Bug]: "
labels: ["Type/Bug"]
type: bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Please select the area the issue is related to
      multiple: true
      options:
        - Area/Agent Lifecycle (Agent create, configure, kinds, build, test, deploy, keys/tokens)
        - Area/Observability (Traces, metrics, logs, monitors, scores)
        - Area/Infrastructure (Environments, deployment pipelines, infra resources, gateway integration)
        - Area/LLM & MCP Governance (LLM providers, LLM proxy, MCP proxy, provider keys)
        - Area/Org & User Management (Projects, organizations, identities, RBAC, multi-tenancy)
        - Area/Console (Web UI shell, navigation, cross-cutting frontend)
        - Area/Evaluation (Evaluation jobs, evaluators)
        - Area/Other (Anything else which does not match above categories)
      default: 0
    validations:
      required: true
  - type: dropdown
    id: aspect
    attributes:
      label: Please select the aspect the issue is related to
      multiple: true
      options:
        - Aspect/Agent Configuration (Agent configuration, kinds, build options)
        - Aspect/Build & Deploy (Agent build, test, deploy, keys/tokens, agent security)
        - Aspect/Traces (Distributed traces)
        - Aspect/Metrics & Logs (Metrics, dashboards, logs)
        - Aspect/Monitors & Scores (Monitors and scores)
        - Aspect/Environments & Pipelines (Environments and deployment pipelines)
        - Aspect/Infra Resources (Infrastructure resources)
        - Aspect/Gateway (Gateway catalog sync, routing, gateway IdPs)
        - Aspect/LLM & MCP (LLM providers, LLM proxy, provider keys, MCP proxy)
        - Aspect/Projects & Orgs (Projects and organizations)
        - Aspect/Identity & Access (Identities, identity providers, roles, permissions, tenancy)
        - Aspect/UI (Layouts, navigation, components, styling)
        - Aspect/Evaluation (Evaluators and evaluation jobs)
        - Aspect/Other (Anything else which does not match above categories)
      default: 0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please share a clear and concise description of the problem.
      placeholder: Description
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps you followed when you encountered the issue. Provide sample source code to reproduce the issue where applicable.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity Level of the Issue
      description: Mark the severity of the issue you are facing
      options:
        - Severity/Blocker (Core functionality is broken and consumer is blocked. Need immediate attention)
        - Severity/Critical (Core functionality is broken but there is a workaround. Need urgent attention)
        - Severity/Major (Important functionality is broken. Should be prioritized. Doesn't need immediate attention)
        - Severity/Minor (Non-critical functionality. Can be fixed in future releases)
        - Severity/Trivial (Cosmetic issues. Can be fixed in future releases)
      default: 0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details (with versions)
      description: Mention the environment details (OS, browser, service version, deployment mode, etc.) that the product is running on.
    validations:
      required: false
